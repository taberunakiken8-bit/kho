<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>通知登録</title>
</head>

<body>

<h1>通知登録</h1>

<h2 id="orderNumber"></h2>

<button onclick="register()">通知を受け取る</button>

<p id="message"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyC6RM9KBCyFA1wjpH5WsUx-dyYSBznySa0",
authDomain: "food-court-f100b.firebaseapp.com",
databaseURL: "https://food-court-f100b-default-rtdb.firebaseio.com",
projectId: "food-court-f100b",
storageBucket: "food-court-f100b.firebasestorage.app",
messagingSenderId: "882661134824",
appId: "1:882661134824:web:da0f95c1f124e8752f945d"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const params = new URLSearchParams(window.location.search);
const order = params.get("order");

document.getElementById("orderNumber").innerText =
"注文番号：" + order;

onValue(ref(db,'orders/' + order),(snapshot)=>{

const data = snapshot.val();

if(data && data.status === "done"){

document.getElementById("message").innerText =
"料理ができました！取りに来てください";

}

});

</script>


</body>
</html>
