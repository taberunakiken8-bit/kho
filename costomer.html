<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>注文状況</title>
</head>

<body>

<h1>注文状況</h1>

<h2 id="orderNumber"></h2>

<button onclick="requestNotification()">
通知を許可する
</button>

<p id="message"></p>

<div id="wait"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getDatabase,
ref,
onValue,
get
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
apiKey: "あなたのAPIキー",
authDomain: "food-court-f100b.firebaseapp.com",
databaseURL: "https://food-court-f100b-default-rtdb.firebaseio.com",
projectId: "food-court-f100b",
storageBucket: "food-court-f100b.appspot.com",
messagingSenderId: "882661134824",
appId: "1:882661134824:web:da0f95c1f124e8752f945d"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const params = new URLSearchParams(window.location.search);
const order = params.get("order");
const shop = params.get("shop");

document.getElementById("orderNumber").innerText =
"注文番号：" + order;

window.requestNotification = function(){

Notification.requestPermission().then(function(permission){

if(permission === "granted"){
alert("通知が許可されました");
}

});

}

onValue(ref(db,'orders/' + shop + '/' + order),(snapshot)=>{

const data = snapshot.val();

if(data && data.status === "done"){

document.getElementById("message").innerText =
"料理ができました！";

if(Notification.permission === "granted"){
new Notification("料理ができました！注文番号：" + order);
}

}

});

function updateWait(){

get(ref(db,'orders/' + shop)).then((snapshot)=>{

if(snapshot.exists()){

const data = snapshot.val();

const keys = Object.keys(data);

keys.sort();

const position = keys.indexOf(order);

document.getElementById("wait").innerText =
"現在 " + position + " 組待ち";

}

});

}

setInterval(updateWait,2000);

</script>

</body>
</html>
