<!DOCTYPE html>
<html>
<head>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

apiKey: "AIzaSyC6RM9KBCyFA1wjpH5WsUx-dyYSBznySa0",
authDomain: "food-court-f100b.firebaseapp.com",
databaseURL: "https://food-court-f100b-default-rtdb.firebaseio.com",
projectId: "food-court-f100b",
storageBucket: "food-court-f100b.firebasestorage.app",
messagingSenderId: "882661134824",
appId: "1:882661134824:web:da0f95c1f124e8752f945d"

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.finishOrder = function(){

set(ref(db,'orders/' + order),{
status:"done"
});

<meta charset="UTF-8">
<title>フードコート注文管理</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

<body>

<h1>注文管理</h1>

<button onclick="newOrder()">新規注文</button>
<button onclick="finishOrder()">料理完成</button>

<h2 id="orderNumber"></h2>

<div id="qrcode"></div>

<script>

let order = 100;

function newOrder() {
order++;

document.getElementById("orderNumber").innerText =
"注文番号：" + order;

document.getElementById("qrcode").innerHTML = "";

let url = "https://taberunakiken8-bit.github.io/kho/costomer.html?order=" + order;

new QRCode(document.getElementById("qrcode"), {
text: url,
width: 200,
height: 200
});
}

function finishOrder() {
localStorage.setItem("finish_" + order, "done");
alert("注文" + order + " 完成通知しました");
}

</script>

</body>
</html>
